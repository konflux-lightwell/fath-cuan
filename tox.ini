[tox]
env_list = lint, type, test

[testenv:lint]
deps = .[dev]
commands =
    ruff check fath_cuan/ tests/
    ruff format --check fath_cuan/ tests/

[testenv:autoformat]
deps = ruff>=0.4
commands = ruff format fath_cuan/ tests/

[testenv:type]
deps = .[dev]
commands =
    mypy fath_cuan/

[testenv:test]
deps = .[dev]
commands =
    pytest tests/ -v
